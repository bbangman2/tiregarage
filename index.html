<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>타이어게러지 메신저</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"><\/script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f2f1ed;--bg2:#fff;--border:rgba(0,0,0,0.09);
  --text:#1a1a1a;--text2:#666;--text3:#bbb;
  --navy:#1a2035;--purple:#5b35b0;
  --green:#15803d;--red:#dc2626;--orange:#c2410c;
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);display:flex;height:100dvh}
#login-wrap{position:fixed;inset:0;background:var(--navy);
  display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.login-card{background:#fff;border-radius:20px;padding:32px 28px;width:100%;max-width:340px;
  box-shadow:0 24px 64px rgba(0,0,0,.35)}
.login-logo{font-size:22px;font-weight:800;color:var(--navy);margin-bottom:3px}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:26px}
.fg{margin-bottom:14px}
.fg label{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.06em;
  text-transform:uppercase;display:block;margin-bottom:5px}
.fg select,.fg input{width:100%;padding:11px 13px;border:1.5px solid var(--border);
  border-radius:10px;font-size:15px;color:var(--text);background:var(--bg);
  outline:none;-webkit-appearance:none;appearance:none;transition:border .15s;font-family:inherit}
.fg select:focus,.fg input:focus{border-color:var(--navy)}
.err{font-size:13px;color:var(--red);margin-bottom:10px;display:none}
.btn-login{width:100%;padding:13px;background:var(--navy);color:#fff;border:none;
  border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.login-hint{font-size:12px;color:var(--text3);text-align:center;margin-top:12px}
#app{width:100%;display:none;flex-direction:row;height:100dvh}
#app.on{display:flex}
.sidebar{width:190px;background:var(--navy);color:#fff;
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-head{padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-logo{font-size:13px;font-weight:800;letter-spacing:.02em}
.sb-user{font-size:11px;opacity:.4;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-rooms{flex:1;padding:6px;overflow-y:auto}
.room-btn{width:100%;padding:9px 11px;border:none;background:none;
  color:rgba(255,255,255,.6);border-radius:8px;font-size:13px;font-weight:500;
  text-align:left;cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:all .12s;white-space:nowrap;overflow:hidden}
.room-btn:hover{background:rgba(255,255,255,.07);color:#fff}
.room-btn.active{background:rgba(255,255,255,.14);color:#fff}
.room-icon{font-size:14px;flex-shrink:0}
.sb-foot{padding:10px;border-top:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;gap:6px}
.logout-btn{width:100%;padding:8px;background:none;border:1px solid rgba(255,255,255,.14);
  color:rgba(255,255,255,.45);border-radius:7px;font-size:12px;cursor:pointer}
.logout-btn:hover{background:rgba(255,255,255,.07);color:#fff}
.admin-btn{width:100%;padding:8px;background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);
  color:rgba(220,100,100,.9);border-radius:7px;font-size:12px;cursor:pointer}
.admin-btn:hover{background:rgba(220,38,38,.25);color:#fff}
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.chat-head{padding:11px 16px;background:#fff;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ch-desc{font-size:11px;color:var(--text2);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.head-right{display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap}
.date-picker-wrap{display:flex;align-items:center;gap:5px;background:var(--bg);
  border:1.5px solid var(--border);border-radius:9px;padding:5px 9px}
.date-picker-wrap input[type=date]{border:none;background:transparent;
  font-size:12px;color:var(--text);outline:none;font-family:inherit;cursor:pointer}
.date-sep{font-size:11px;color:var(--text3)}
.range-toggle{font-size:11px;color:var(--text2);cursor:pointer;
  padding:2px 7px;border-radius:5px;border:1px solid var(--border);background:#fff;white-space:nowrap}
.range-toggle.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.ai-btn{padding:7px 13px;background:var(--navy);color:#fff;border:none;
  border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:4px;white-space:nowrap;transition:all .15s}
.ai-btn:disabled{opacity:.45;cursor:not-allowed}
.icon-btn{padding:7px 10px;background:var(--bg);color:var(--text2);border:1.5px solid var(--border);
  border-radius:8px;font-size:13px;cursor:pointer}
.msgs{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 14px;
  display:flex;flex-direction:column;gap:2px;-webkit-overflow-scrolling:touch}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.day-div{text-align:center;position:relative;margin:14px 0 8px;flex-shrink:0}
.day-div::before{content:'';position:absolute;left:0;right:0;top:50%;height:.5px;background:var(--border)}
.day-div span{background:var(--bg);padding:0 10px;position:relative;font-size:11px;color:var(--text3)}
.msg-group{max-width:100%;flex-shrink:0;position:relative}
.msg-group.own{display:flex;flex-direction:column;align-items:flex-end}
.msg-head{display:flex;align-items:baseline;gap:6px;margin-bottom:3px}
.msg-group.own .msg-head{flex-direction:row-reverse}
.msg-name{font-size:12px;font-weight:700}
.msg-time{font-size:11px;color:var(--text3)}
.msg-body{background:#fff;border:1px solid var(--border);
  border-radius:3px 12px 12px 12px;padding:9px 13px;font-size:14px;
  line-height:1.65;white-space:pre-wrap;word-break:break-word;
  max-width:min(520px,85vw);display:inline-block}
.msg-group.own .msg-body{background:#dbeafe;border-color:#bfdbfe;border-radius:12px 3px 12px 12px}
.msg-del-btn{position:absolute;top:-6px;right:-6px;width:20px;height:20px;
  background:var(--red);color:#fff;border:none;border-radius:50%;font-size:11px;
  cursor:pointer;display:none;align-items:center;justify-content:center;font-weight:700;z-index:10}
.msg-group:hover .msg-del-btn{display:flex}
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--text3);flex-direction:column;gap:8px}
.msg-body.ai{background:#fafaf8;border:1.5px solid #d1c4f0;border-left:4px solid var(--purple);
  border-radius:4px 12px 12px 12px;font-size:13px;line-height:1.75;
  color:var(--text);max-width:min(680px,94vw);padding:0;overflow:hidden}
.ai-top-bar{background:var(--navy);color:#fff;padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between}
.ai-top-title{font-size:12px;font-weight:700;letter-spacing:.04em}
.ai-top-meta{font-size:11px;opacity:.55}
.ai-body{padding:14px 16px}
.ai-section{margin-bottom:18px}
.ai-section:last-child{margin-bottom:0}
.ai-sec-header{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  color:#fff;background:var(--purple);padding:4px 10px;border-radius:5px;
  display:inline-flex;align-items:center;gap:5px;margin-bottom:10px}
.ai-subsec{margin-bottom:12px;background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.ai-subsec-header{background:#f8f7f4;border-bottom:1px solid var(--border);
  padding:7px 12px;font-size:12px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:6px}
.ai-subsec-header .cnt{font-size:11px;font-weight:600;color:#fff;
  background:var(--navy);border-radius:99px;padding:1px 7px;margin-left:auto}
.ai-tire-table{width:100%;border-collapse:collapse;font-size:12px}
.ai-tire-table thead tr{background:#f0efec}
.ai-tire-table thead th{padding:5px 10px;text-align:left;font-size:10px;font-weight:700;
  color:var(--text2);letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}
.ai-tire-table tbody tr:nth-child(even){background:#fafaf8}
.ai-tire-table tbody tr:hover{background:#f3f0fb}
.ai-tire-table td{padding:6px 10px;vertical-align:top;border-top:1px solid #f0eeea}
.ai-tire-table td.model{font-weight:600;color:var(--navy);white-space:nowrap}
.ai-tire-table td.spec{color:#374151;font-family:'SF Mono','Fira Code',monospace;font-size:11.5px}
.ai-tire-table td.qty{text-align:center;font-weight:700;color:var(--purple);white-space:nowrap}
.ai-tire-table td.purpose{color:var(--text2);font-size:11px}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;margin:1px 2px;white-space:nowrap}
.tag-ping-direct{background:#dcfce7;color:#15803d}
.tag-ping-delivery{background:#dbeafe;color:#1e40af}
.tag-store{background:#fef3c7;color:#92400e}
.tag-trade{background:#f3e8ff;color:#6b21a8}
.tag-unknown{background:#f3f4f6;color:#6b7280;font-style:italic}
.tag-etc{background:#fee2e2;color:#991b1b}
.ai-empty{color:var(--text3);font-style:italic;font-size:12px;padding:10px 12px}
.ai-note{background:#fffbeb;border:1px solid #fde68a;border-radius:6px;
  padding:8px 12px;font-size:11px;color:#92400e;margin-top:10px}
.input-wrap{padding:10px 12px 12px;background:#fff;border-top:1px solid var(--border);flex-shrink:0}
.input-row{display:flex;gap:8px;align-items:flex-end}
.msg-inp{flex:1;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;
  font-size:15px;resize:none;min-height:42px;max-height:100px;
  background:var(--bg);color:var(--text);outline:none;font-family:inherit;line-height:1.5}
.msg-inp:focus{border-color:var(--navy)}
.send-btn{padding:10px 16px;background:var(--navy);color:#fff;border:none;
  border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;min-height:42px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;
  align-items:flex-start;justify-content:center;z-index:300;padding:20px;overflow-y:auto}
.overlay.on{display:flex}
.result-modal{background:#fff;border-radius:16px;width:100%;max-width:760px;
  position:relative;overflow:hidden;margin:auto;box-shadow:0 32px 80px rgba(0,0,0,.3)}
.result-modal-head{background:var(--navy);color:#fff;padding:16px 20px;
  display:flex;align-items:center;justify-content:space-between}
.result-modal-title{font-size:15px;font-weight:800}
.result-modal-close{background:none;border:none;color:rgba(255,255,255,.5);font-size:22px;cursor:pointer;padding:4px 8px}
.result-modal-body{padding:20px;max-height:80dvh;overflow-y:auto}
.admin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);
  display:none;align-items:flex-end;justify-content:center;z-index:400}
.admin-overlay.on{display:flex}
.admin-panel{background:#fff;border-radius:20px 20px 0 0;padding:24px 22px 36px;
  width:100%;max-width:480px;position:relative;max-height:85dvh;overflow-y:auto}
.admin-panel-title{font-size:16px;font-weight:800;color:var(--red);margin-bottom:4px}
.admin-panel-sub{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6}
.admin-panel-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);padding:4px}
.danger-section{border:1.5px solid #fecaca;border-radius:12px;padding:16px;margin-bottom:14px;background:#fff5f5}
.danger-title{font-size:13px;font-weight:700;color:var(--red);margin-bottom:12px}
.del-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.del-select{flex:1;min-width:120px;padding:9px 12px;border:1.5px solid var(--border);
  border-radius:9px;font-size:13px;background:#fff;outline:none;font-family:inherit;-webkit-appearance:none}
.btn-danger{padding:9px 18px;background:var(--red);color:#fff;border:none;
  border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.del-hint{font-size:11px;color:var(--text3);margin-top:4px}
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:none;align-items:flex-end;justify-content:center;z-index:400}
.settings-overlay.on{display:flex}
.settings-modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 22px 32px;
  width:100%;max-width:480px;position:relative;max-height:80dvh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:800;margin-bottom:5px;color:var(--navy)}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.6}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);padding:4px}
.hint{font-size:12px;color:var(--text2);margin-top:6px;line-height:1.6}
.btn-save{margin-top:14px;width:100%;padding:13px;background:var(--purple);color:#fff;
  border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.btn-skip{margin-top:8px;width:100%;padding:11px;background:none;color:var(--text2);
  border:1.5px solid var(--border);border-radius:10px;font-size:14px;cursor:pointer}
.mode-card{display:flex;align-items:center;justify-content:space-between;
  background:var(--bg);border-radius:10px;padding:11px 13px;margin-bottom:16px}
.mode-card-label{font-size:13px;color:var(--text2)}
.mode-card-val{font-size:13px;font-weight:700}
@media(max-width:600px){
  .sidebar{width:46px}
  .sb-head,.sb-user,.room-label{display:none}
  .room-btn{justify-content:center;padding:11px 0}
  .ch-desc,.date-picker-wrap{display:none}
  .msgs{padding:10px}
  .msg-body{font-size:14px;max-width:82vw}
  .msg-body.ai{font-size:12px;max-width:93vw}
  .input-wrap{padding:8px 10px 14px}
  .msg-inp{font-size:16px}
}
</style>
</head>
<body>
<div id="login-wrap">
  <div class="login-card">
    <div class="login-logo">🛞 타이어게러지</div>
    <div class="login-sub">내부 메신저 — 직원 전용</div>
    <div class="fg"><label>이름</label>
      <select id="sel-name">
        <option value="">선택하세요</option>
        <option>이호준</option><option>남성현</option><option>김다영</option>
        <option>임예지</option><option>이민재</option><option>정지훈</option>
        <option>이영재</option><option>이정우</option><option>이세진</option><option>손정현</option>
      </select></div>
    <div class="fg"><label>비밀번호</label><input type="password" id="inp-pw" placeholder="비밀번호 입력"></div>
    <div class="err" id="login-err"></div>
    <button class="btn-login" onclick="doLogin()">입장하기</button>
    <div class="login-hint">비밀번호는 각자 개별 지급</div>
  </div>
</div>

<div id="app">
  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-logo">🛞 타이어게러지</div>
      <div class="sb-user" id="sb-username"></div>
    </div>
    <div class="sb-rooms" id="sb-rooms"></div>
    <div class="sb-foot">
      <div id="admin-sidebar-btn" style="display:none">
        <button class="admin-btn" onclick="openAdmin()">🗑️ 관리자 삭제</button>
      </div>
      <button class="logout-btn" onclick="doLogout()">나가기</button>
    </div>
  </div>
  <div class="chat-wrap">
    <div class="chat-head">
      <div class="ch-info">
        <div class="ch-name" id="ch-name">채팅방</div>
        <div class="ch-desc" id="ch-desc"></div>
      </div>
      <div class="head-right">
        <div class="date-picker-wrap" id="date-picker-wrap" style="display:none">
          <input type="date" id="date-from">
          <span class="date-sep" id="date-sep" style="display:none">~</span>
          <input type="date" id="date-to" style="display:none">
          <button class="range-toggle" id="range-toggle" onclick="toggleRange()">범위</button>
        </div>
        <button class="ai-btn" id="ai-btn" style="display:none" onclick="runAI()">✨ 정리</button>
        <button class="icon-btn" id="settings-btn" style="display:none" onclick="openSettings()">⚙️</button>
      </div>
    </div>
    <div class="msgs" id="msgs"><div class="empty-state"><span>💬</span><span>불러오는 중...</span></div></div>
    <div class="input-wrap">
      <div class="input-row">
        <textarea class="msg-inp" id="msg-inp" placeholder="메시지 입력 (Enter 전송, Shift+Enter 줄바꿈)" rows="1"
          onkeydown="onKey(event)" oninput="resize(this)"></textarea>
        <button class="send-btn" onclick="sendMsg()">전송</button>
      </div>
    </div>
  </div>
</div>

<!-- 결과 모달 -->
<div class="overlay" id="result-overlay" onclick="closeResultIfBg(event)">
  <div class="result-modal">
    <div class="result-modal-head">
      <div class="result-modal-title" id="result-modal-title">📋 정리 결과</div>
      <button class="result-modal-close" onclick="closeResult()">×</button>
    </div>
    <div class="result-modal-body" id="result-modal-body"></div>
  </div>
</div>

<!-- 관리자 패널 -->
<div class="admin-overlay" id="admin-overlay">
  <div class="admin-panel">
    <button class="admin-panel-close" onclick="closeAdmin()">×</button>
    <div class="admin-panel-title">🗑️ 관리자 — 메시지 삭제</div>
    <div class="admin-panel-sub">이호준 전용 기능입니다. 삭제된 메시지는 복구 불가합니다.</div>
    <div class="danger-section">
      <div class="danger-title">📅 날짜별 삭제</div>
      <div class="del-row">
        <select class="del-select" id="del-room-sel" onchange="loadAdminDates()">
          <option value="">방 선택...</option>
        </select>
        <select class="del-select" id="del-date-sel"><option value="">날짜 선택...</option></select>
        <button class="btn-danger" onclick="deleteByDate()">삭제</button>
      </div>
      <div class="del-hint">선택 날짜의 모든 메시지(AI 포함)를 삭제합니다.</div>
    </div>
    <div class="danger-section">
      <div class="danger-title">💥 방 전체 초기화</div>
      <div class="del-row">
        <select class="del-select" id="del-room-all-sel"><option value="">방 선택...</option></select>
        <button class="btn-danger" onclick="deleteAllInRoom()">전체 삭제</button>
      </div>
      <div class="del-hint">해당 방 전체 메시지를 완전히 초기화합니다. 방 이름 입력으로 재확인합니다.</div>
    </div>
    <div id="admin-log" style="font-size:12px;color:var(--text2);margin-top:8px;min-height:20px;padding:4px"></div>
  </div>
</div>

<!-- 설정 모달 -->
<div class="settings-overlay" id="settings-overlay">
  <div class="settings-modal">
    <button class="modal-close" onclick="closeSettings()">×</button>
    <div class="modal-title">⚙️ AI 정리 설정</div>
    <div class="modal-sub">Claude API 키 등록 시 AI가 채팅을 직접 이해해서 정리합니다.<br>미등록 시 패턴 자동 정리(무료)로 동작합니다.</div>
    <div class="mode-card">
      <span class="mode-card-label">현재 모드</span>
      <span class="mode-card-val" id="cur-mode-txt" style="color:var(--orange)">패턴 자동 정리 (무료)</span>
    </div>
    <div class="fg">
      <label>Claude API 키 (선택)</label>
      <input type="text" id="api-key-inp" placeholder="sk-ant-..." style="font-family:monospace;font-size:13px">
      <div class="hint">발급: <b>console.anthropic.com</b> → API Keys<br>이 기기에만 저장됩니다.</div>
    </div>
    <button class="btn-save" onclick="saveKey()">저장</button>

/* AI 정리 */
async function runAI(){

function filterMsgsByDate(from,to){return msgs.filter(m=>{if(!m||m.user_name==='AI'||!m.created_at)return false;const ds=toDateStr(m.created_at);return ds>=from&&ds<=to;});}
function buildDateLabel(from,to){
  if(from===to)return new Date(from+'T00:00:00+09:00').toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  return new Date(from+'T00:00:00+09:00').toLocaleDateString('ko-KR',{month:'long',day:'numeric'})+' ~ '+new Date(to+'T00:00:00+09:00').toLocaleDateString('ko-KR',{month:'long',day:'numeric'});
}
function groupByDate(messages){const map=new Map();messages.forEach(m=>{const ds=toDateStr(m.created_at);if(!map.has(ds))map.set(ds,[]);map.get(ds).push(m);});return map;}
async function runClaude(key,from,to){
  const filtered=filterMsgsByDate(from,to);if(!filtered.length){alert('해당 날짜에 메시지가 없어요.');return;}
  const byDate=groupByDate(filtered);const dateLabel=buildDateLabel(from,to);
  const chatTxt=[...byDate].map(([ds,items])=>{
    const dl=new Date(ds+'T00:00:00+09:00').toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
    return`▶ ${dl}\n${items.map(m=>`[${m.user_name}] ${m.content}`).join('\n')}`;
  }).join('\n\n────────────────\n\n');
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,messages:[{role:'user',content:buildClaudePrompt(chatTxt,dateLabel)}]})});
  const data=await res.json();if(data.error)throw new Error(data.error.message);
  const raw=data.content?.[0]?.text||'';const jm=raw.match(/\{[\s\S]*\}/);if(!jm)throw new Error('AI 응답 파싱 실패');
  const parsed=JSON.parse(jm[0]);parsed.__type='tire_summary';parsed.dateLabel=dateLabel;
  await postAI(JSON.stringify(parsed));
}
function buildClaudePrompt(chatTxt,dateLabel){
  return`당신은 타이어 유통업 사내 입고방 채팅을 정리하는 전문가입니다.\n\n## 채팅 내역\n${chatTxt}\n\n## 출력 형식 (순수 JSON만, 마크다운 없이)\n{\n  "sections": [\n    {\n      "key": "recv_maeil",\n      "items": [\n        { "model": "모델명", "spec": "규격(예:225/45R18)", "qty": "수량", "purpose": "용도/배송방법" }\n      ]\n    }\n  ],\n  "note": "특이사항"\n}\n\n## 섹션 key (해당 항목 있는 것만)\nrecv_maeil / recv_yangju / recv_hwangje / recv_toekyewon\norder_maeil / order_nexen / order_hanta / order_geukdong\narr_hankook / arr_nexen\n\n## 규칙\n1. 모델명 원본 대소문자 정리 (TA21, KC53 등)\n2. 규격 표준화: 225 45 18 → 225/45R18\n3. purpose: 괄호 안 내용 그대로. 없으면 "미기입"\n4. 중복 제거 (같은 모델+규격+수량 반복 시 대표 1개)\n5. qty: 숫자만\n6. 일반 대화(확인, 네 등) 무시\n\nJSON만 출력하고 다른 텍스트 절대 포함 금지.`;
}
async function runPattern(from,to){
  const filtered=filterMsgsByDate(from,to);if(!filtered.length){alert('해당 날짜에 메시지가 없어요.');return;}
  const byDate=groupByDate(filtered);const dateLabel=buildDateLabel(from,to);
  const B={recv_maeil:new Map(),recv_yangju:new Map(),recv_hwangje:new Map(),recv_toekyewon:new Map(),order_maeil:new Map(),order_nexen:new Map(),order_hanta:new Map(),order_geukdong:new Map(),arr_hankook:new Map(),arr_nexen:new Map()};
  for(const[,items]of byDate){const lines=[];items.forEach(m=>(m.content||'').split('\n').forEach(l=>{const t=l.trim();if(t)lines.push(t);}));parsePatternInto(lines,B);}
  const KEYS=['recv_maeil','recv_yangju','recv_hwangje','recv_toekyewon','order_maeil','order_nexen','order_hanta','order_geukdong','arr_hankook','arr_nexen'];
  const sections=KEYS.filter(k=>B[k].size>0).map(k=>({key:k,items:[...B[k].values()]}));
  await postAI(JSON.stringify({__type:'tire_summary',dateLabel,sections,note:''}));
}
function parsePatternInto(lines,B){
  let zone='recv',sub='recv_maeil';
  for(const line of lines){
    if(/받아오기/.test(line)&&!isTL(line)){zone='recv';sub='recv_maeil';continue;}
    if(/거래처\s*발주|발주/.test(line)&&!isTL(line)){zone='order';sub='order_maeil';continue;}
    if(/물류차\s*입고/.test(line)&&!isTL(line)){zone='arr';sub='arr_hankook';continue;}
    if(zone==='recv'){
      if(/양주\s*SFP/i.test(line)){sub='recv_yangju';continue;}
      if(/황제/.test(line)&&!isTL(line)){sub='recv_hwangje';continue;}
      if(/퇴계원/.test(line)&&!isTL(line)){sub='recv_toekyewon';continue;}
      if(/매일\s*(오후|타이어|받아오기)|\[매일\s*오후\]/i.test(line)){sub='recv_maeil';continue;}
    }
    if(zone==='order'){
      if(/매일\s*오전|\[매일\s*오전\]/i.test(line)){sub='order_maeil';continue;}
      if(/\[넥센\]|넥센\s*주문/i.test(line)){sub='order_nexen';continue;}
      if(/한타\s*주문|\[한타/i.test(line)){sub='order_hanta';continue;}
      if(/\[극동\]|극동/i.test(line)){sub='order_geukdong';continue;}
    }
    if(zone==='arr'){if(/^\[한국\]$/.test(line)){sub='arr_hankook';continue;}if(/^\[넥센\]$/.test(line)){sub='arr_nexen';continue;}}
    if(/^[-=]{3,}$/.test(line))continue;
    if(B[sub]&&isTL(line)){const k=TK(line);if(!B[sub].has(k))B[sub].set(k,PTL(line));}
  }
}
function PTL(line){
  const pm=line.match(/\(([^)]+)\)/g);const purpose=pm?pm.map(p=>p.slice(1,-1)).join(', '):'미기입';
  const base=line.replace(/\([^)]*\)/g,'').trim();const parts=base.split(/\s+/);
  let si=parts.findIndex(p=>/^\d{3}/.test(p)||/^\d{2,3}[\/]/.test(p));if(si<0)si=1;
  const model=parts.slice(0,si).join(' ')||parts[0];
  const nums=parts.filter(p=>/^\d+p?$/i.test(p));const qty=nums.length?nums[nums.length-1]:'';
  const spec=parts.slice(si,parts.length-(nums.length?1:0)).join(' ');
  return{model:model.toUpperCase(),spec:spec||base,qty,purpose};
}
function isTL(line){
  if(!line||line.length<4)return false;if(/^[-=\[\(（]/.test(line))return false;
  if(/^(받아오기|거래처|물류차|매일|황제|한국타이어|넥센|한국|한타|극동|양주|퇴계원|재고\s*주문|@)/.test(line))return false;
  return/[A-Za-z가-힣][A-Za-z0-9가-힣\s\+\-]*[\s\/]\d{2,3}[\s\/]\d{2}/.test(line)||/\d{3}[\s\/]\d{2}[\s\/]?\d{2}/.test(line);
}
function TK(line){return line.toLowerCase().replace(/\s+/g,' ').trim().split(' ').slice(0,5).join(' ');}

/* 관리자 */
function populateAdminSelects(){
  ['del-room-sel','del-room-all-sel'].forEach(id=>{
    const s=document.getElementById(id);
    s.innerHTML='<option value="">방 선택...</option>'+rooms.map(r=>`<option value="${r.id}">${r.name}</option>`).join('');
  });
}
async function loadAdminDates(){
  const roomId=document.getElementById('del-room-sel').value;
  const sel=document.getElementById('del-date-sel');
  sel.innerHTML='<option value="">날짜 선택...</option>';
  if(!roomId)return;
  const{data}=await sb.from('messages').select('created_at').eq('room_id',roomId).order('created_at',{ascending:true});
  if(!data?.length)return;
  const ds=[...new Set(data.map(m=>toDateStr(m.created_at)))].sort();
  ds.forEach(d=>{
    const opt=document.createElement('option');opt.value=d;
    opt.textContent=new Date(d+'T00:00:00+09:00').toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'})+` (${d})`;
    sel.appendChild(opt);
  });
  adminLog(`날짜 목록 로드: ${ds.length}개`);
}
async function deleteByDate(){
  const roomId=document.getElementById('del-room-sel').value;
  const dv=document.getElementById('del-date-sel').value;
  if(!roomId){alert('방을 선택하세요');return;}if(!dv){alert('날짜를 선택하세요');return;}
  const room=rooms.find(r=>r.id===roomId);
  if(!confirm(`⚠️ [${room?.name}] ${dv} 날짜의 모든 메시지를 삭제하시겠습니까?\n되돌릴 수 없습니다.`))return;
  const{start,end}=dateToUTCRange(dv);
  const{error}=await sb.from('messages').delete().eq('room_id',roomId).gte('created_at',start).lte('created_at',end);
  if(error){alert('삭제 오류: '+error.message);return;}
  adminLog(`✓ 삭제 완료: [${room?.name}] ${dv}`);
  if(curRoom?.id===roomId)await loadMsgs();await loadAdminDates();
}
async function deleteAllInRoom(){
  const roomId=document.getElementById('del-room-all-sel').value;
  if(!roomId){alert('방을 선택하세요');return;}
  const room=rooms.find(r=>r.id===roomId);
  if(!confirm(`⚠️ [${room?.name}] 방의 모든 메시지를 완전히 삭제하시겠습니까?\n이 작업은 절대 되돌릴 수 없습니다.`))return;
  const confirmed=prompt(`확인을 위해 방 이름을 정확히 입력하세요:\n${room?.name}`);
  if(confirmed!==room?.name){alert('방 이름이 일치하지 않아 취소됩니다.');return;}
  const{error}=await sb.from('messages').delete().eq('room_id',roomId);
  if(error){alert('삭제 오류: '+error.message);return;}
  adminLog(`💥 전체 삭제 완료: [${room?.name}]`);
  if(curRoom?.id===roomId)await loadMsgs();
}
function adminLog(msg){document.getElementById('admin-log').textContent=msg;}
function openAdmin(){if(me?.name!==ADMIN_NAME){alert('관리자만 접근 가능합니다');return;}document.getElementById('admin-overlay').classList.add('on');}
function closeAdmin(){document.getElementById('admin-overlay').classList.remove('on');}

/* 설정 */
function openSettings(){
  const key=localStorage.getItem('tg_claude_key')||'';document.getElementById('api-key-inp').value=key;
  const mv=document.getElementById('cur-mode-txt'),cb=document.getElementById('clear-btn');
  if(key){mv.textContent='Claude AI (등록됨)';cb.style.display='block';}
  else{mv.textContent='패턴 자동 정리 (무료)';cb.style.display='none';}
  document.getElementById('settings-overlay').classList.add('on');
}
function closeSettings(){document.getElementById('settings-overlay').classList.remove('on');}
function saveKey(){const k=document.getElementById('api-key-inp').value.trim();if(k)localStorage.setItem('tg_claude_key',k);else localStorage.removeItem('tg_claude_key');closeSettings();}
function clearKey(){if(confirm('API 키를 삭제하고 패턴 모드로 돌아갈까요?')){localStorage.removeItem('tg_claude_key');closeSettings();}}

document.getElementById('inp-pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

if(_saved){try{me=JSON.parse(_saved);bootApp();}catch{localStorage.removeItem('tg_me');}}
