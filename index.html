<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>타이어게러지 메신저</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f3ef;--bg2:#ffffff;--border:rgba(0,0,0,0.08);
  --text:#1c1c1c;--text2:#888;--text3:#bbb;
  --navy:#1a2035;--navy2:#252d45;
  --purple:#6c3fc5;--purple-light:#f0ebfc;
  --green:#16a34a;--red:#dc2626;
  --radius:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo',sans-serif;
  background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;display:flex}

/* ── LOGIN ── */
#login-wrap{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:200}
.login-card{background:#fff;border-radius:20px;padding:36px 32px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.login-logo{font-size:24px;font-weight:800;color:var(--navy);margin-bottom:4px;letter-spacing:-0.5px}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:28px}
.fgroup{margin-bottom:16px}
.fgroup label{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.04em;text-transform:uppercase;display:block;margin-bottom:6px}
.fgroup select,.fgroup input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-size:14px;color:var(--text);background:var(--bg);outline:none;-webkit-appearance:none;appearance:none;transition:border .15s}
.fgroup select:focus,.fgroup input:focus{border-color:var(--navy)}
.err{font-size:13px;color:var(--red);margin-bottom:10px;display:none}
.btn-login{width:100%;padding:13px;background:var(--navy);color:#fff;border:none;border-radius:10px;
  font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.02em;transition:opacity .15s}
.btn-login:hover{opacity:.88}
.login-hint{font-size:12px;color:var(--text3);text-align:center;margin-top:14px}

/* ── APP LAYOUT ── */
#app{width:100%;height:100dvh;display:none;flex-direction:row}
#app.on{display:flex}

/* ── SIDEBAR ── */
.sidebar{width:200px;background:var(--navy);color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.sb-head{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.07)}
.sb-logo{font-size:14px;font-weight:800;letter-spacing:.03em;opacity:.95}
.sb-user{font-size:12px;opacity:.45;margin-top:3px}
.sb-rooms{flex:1;padding:8px}
.room-btn{
  width:100%;padding:9px 12px;border:none;background:none;color:rgba(255,255,255,.65);
  border-radius:8px;font-size:13px;font-weight:500;text-align:left;cursor:pointer;
  display:flex;align-items:center;gap:9px;transition:all .12s;
}
.room-btn:hover{background:rgba(255,255,255,.07);color:#fff}
.room-btn.active{background:rgba(255,255,255,.14);color:#fff}
.room-icon{font-size:15px;flex-shrink:0}
.sb-foot{padding:12px;border-top:1px solid rgba(255,255,255,.07)}
.logout-btn{width:100%;padding:8px;background:none;border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.5);border-radius:7px;font-size:12px;cursor:pointer;transition:all .12s}
.logout-btn:hover{background:rgba(255,255,255,.07);color:#fff}

/* ── CHAT AREA ── */
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.chat-head{
  padding:14px 20px;background:#fff;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.ch-name{font-size:15px;font-weight:700;letter-spacing:-.02em}
.ch-desc{font-size:12px;color:var(--text2);margin-top:1px}
.ai-btn{
  margin-left:auto;padding:7px 16px;background:var(--purple);color:#fff;
  border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:5px;transition:all .15s;flex-shrink:0;white-space:nowrap;
}
.ai-btn:hover{background:#5a32a8}
.ai-btn:disabled{opacity:.5;cursor:not-allowed}

/* ── MESSAGES ── */
.msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:1px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.day-div{text-align:center;position:relative;margin:16px 0 8px}
.day-div::before{content:'';position:absolute;left:0;right:0;top:50%;height:.5px;background:var(--border)}
.day-div span{background:var(--bg);padding:0 12px;position:relative;font-size:11px;color:var(--text3)}

.msg-group{margin-bottom:8px}
.msg-group.own{display:flex;flex-direction:column;align-items:flex-end}
.msg-head{display:flex;align-items:baseline;gap:7px;margin-bottom:3px}
.msg-group.own .msg-head{flex-direction:row-reverse}
.msg-name{font-size:12px;font-weight:700;color:var(--text)}
.msg-time{font-size:11px;color:var(--text3)}
.msg-body{
  background:#fff;border:1px solid var(--border);border-radius:3px 12px 12px 12px;
  padding:10px 14px;font-size:14px;line-height:1.65;white-space:pre-wrap;
  word-break:break-word;max-width:580px;display:inline-block;color:var(--text);
}
.msg-group.own .msg-body{background:#dbeafe;border-color:#bfdbfe;border-radius:12px 3px 12px 12px}
.msg-body.ai{
  background:var(--purple-light);border-color:#c4b5fd;border-left:3px solid var(--purple);
  border-radius:3px 12px 12px 12px;font-family:'SF Mono','Fira Code',monospace;font-size:12.5px;
  color:#3b1f82;
}
.ai-label{font-size:10px;font-weight:700;color:var(--purple);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--text3);flex-direction:column;gap:8px}

/* ── INPUT ── */
.input-wrap{padding:12px 20px 16px;background:#fff;border-top:1px solid var(--border);flex-shrink:0}
.input-row{display:flex;gap:8px;align-items:flex-end}
.msg-inp{
  flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-size:14px;resize:none;min-height:42px;max-height:120px;
  background:var(--bg);color:var(--text);outline:none;font-family:inherit;line-height:1.5;
  transition:border .15s;
}
.msg-inp:focus{border-color:var(--navy)}
.send-btn{
  padding:10px 18px;background:var(--navy);color:#fff;border:none;
  border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;
  transition:opacity .15s;
}
.send-btn:hover{opacity:.85}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);
  display:none;align-items:center;justify-content:center;z-index:300}
.overlay.on{display:flex}
.modal{background:#fff;border-radius:18px;padding:28px;width:100%;max-width:400px;position:relative}
.modal-title{font-size:16px;font-weight:800;margin-bottom:18px;color:var(--navy)}
.modal-close{position:absolute;top:18px;right:18px;background:none;border:none;
  font-size:22px;cursor:pointer;color:var(--text3);line-height:1}
.modal-close:hover{color:var(--text)}
.modal-hint{font-size:12px;color:var(--text2);margin-top:6px;line-height:1.6}
.btn-save{margin-top:16px;width:100%;padding:11px;background:var(--purple);color:#fff;
  border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.btn-save:hover{opacity:.88}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .sidebar{width:52px}
  .sb-head,.sb-user,.room-label,.sb-foot{display:none}
  .room-btn{justify-content:center;padding:12px 8px}
  .chat-head{padding:12px 14px}
  .msgs{padding:12px 14px}
  .input-wrap{padding:10px 14px 14px}
}
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-wrap">
  <div class="login-card">
    <div class="login-logo">🛞 타이어게러지</div>
    <div class="login-sub">내부 메신저 — 직원 전용</div>
    <div class="fgroup">
      <label>이름</label>
      <select id="sel-name">
        <option value="">선택하세요</option>
        <option>이호준</option>
        <option>남성현</option>
        <option>김다영</option>
        <option>임예지</option>
        <option>이민재</option>
        <option>권순현</option>
        <option>이영재</option>
        <option>이정우</option>
        <option>이세진</option>
        <option>손정현</option>
      </select>
    </div>
    <div class="fgroup">
      <label>비밀번호</label>
      <input type="password" id="inp-pw" placeholder="비밀번호 입력">
    </div>
    <div class="err" id="login-err"></div>
    <button class="btn-login" onclick="doLogin()">입장하기</button>
    <div class="login-hint">초기 비밀번호: tg1234</div>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app">
  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-logo">🛞 TG</div>
      <div class="sb-user" id="sb-username"></div>
    </div>
    <div class="sb-rooms" id="sb-rooms"></div>
    <div class="sb-foot">
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="chat-wrap">
    <div class="chat-head">
      <div>
        <div class="ch-name" id="ch-name">채팅방</div>
        <div class="ch-desc" id="ch-desc"></div>
      </div>
      <button class="ai-btn" id="ai-btn" style="display:none" onclick="runAI()">✨ AI 정리</button>
    </div>
    <div class="msgs" id="msgs">
      <div class="empty-state"><span>💬</span><span>메시지를 불러오는 중...</span></div>
    </div>
    <div class="input-wrap">
      <div class="input-row">
        <textarea class="msg-inp" id="msg-inp" placeholder="메시지 입력... (Shift+Enter 줄바꿈)" rows="1"
          onkeydown="onKey(event)" oninput="resize(this)"></textarea>
        <button class="send-btn" onclick="sendMsg()">전송</button>
      </div>
    </div>
  </div>
</div>

<!-- API 키 설정 모달 -->
<div class="overlay" id="api-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title">✨ AI 정리 설정</div>
    <div class="fgroup">
      <label>Anthropic API 키</label>
      <input type="password" id="api-key-inp" placeholder="sk-ant-api03-..." style="font-family:monospace;font-size:13px">
      <div class="modal-hint">
        console.anthropic.com 에서 발급받으세요.<br>
        이 기기(브라우저)에만 저장되며 외부로 전송되지 않습니다.
      </div>
    </div>
    <button class="btn-save" onclick="saveKey()">저장 후 정리 시작</button>
  </div>
</div>

<script>
const SUPA_URL = 'https://dohspibpjzdrnigphalt.supabase.co';
const SUPA_KEY = 'sb_publishable_JCYJcVDoQkHXd6SuhtjIAw_Wz44s0Y3';
const { createClient } = supabase;
const sb = createClient(SUPA_URL, SUPA_KEY);

const PASSWORDS = {
  '이호준':'bbangman2','남성현':'tg1234','김다영':'tg1234','임예지':'tg1234','이민재':'tg1234',
  '권순현':'tg1234','이영재':'tg1234','이정우':'wowlee1216','이세진':'tg1234','손정현':'tg1234'
};
const ROOM_META = {
  '입고방':{icon:'📦',ai:true,desc:'받아오기 / 거래처 발주 / 물류차 입고'},
  '공지방':{icon:'📢',ai:false,desc:'사장님 공지 및 전달사항'},
  '자유방':{icon:'💬',ai:false,desc:'자유로운 대화'},
};

let me = null, rooms = [], curRoom = null, msgs = [], sub = null;

// ── 로그인 ──
async function doLogin(){
  const name = document.getElementById('sel-name').value;
  const pw   = document.getElementById('inp-pw').value;
  const err  = document.getElementById('login-err');
  err.style.display = 'none';
  if(!name){ showErr('이름을 선택해주세요'); return; }
  if(!pw){ showErr('비밀번호를 입력해주세요'); return; }
  if(PASSWORDS[name] !== pw){ showErr('비밀번호가 틀렸습니다 (초기: tg1234)'); return; }

  let { data: user } = await sb.from('users').select('*').eq('name',name).maybeSingle();
  if(!user){
    const { data: created } = await sb.from('users').insert({name, password: pw}).select().single();
    user = created;
  }
  me = user;
  localStorage.setItem('tg_me', JSON.stringify(me));
  bootApp();
}
function showErr(msg){ const e=document.getElementById('login-err'); e.textContent=msg; e.style.display='block'; }

function doLogout(){
  me=null; localStorage.removeItem('tg_me');
  if(sub) sb.removeChannel(sub);
  document.getElementById('app').classList.remove('on');
  document.getElementById('login-wrap').style.display='flex';
}

// ── 앱 시작 ──
async function bootApp(){
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('app').classList.add('on');
  document.getElementById('sb-username').textContent = me.name;

  const { data } = await sb.from('rooms').select('*').order('created_at');
  rooms = data || [];
  renderSidebar();
  if(rooms.length) selectRoom(rooms[0]);
}

function renderSidebar(){
  const el = document.getElementById('sb-rooms');
  el.innerHTML = rooms.map((r,i)=>{
    const m = ROOM_META[r.name] || {icon:'💬'};
    const active = curRoom?.id === r.id ? 'active' : '';
    return `<button class="room-btn ${active}" onclick="selectRoom(rooms[${i}])">
      <span class="room-icon">${m.icon}</span>
      <span class="room-label">${r.name}</span>
    </button>`;
  }).join('');
}

async function selectRoom(room){
  curRoom = room;
  const m = ROOM_META[room.name] || {icon:'💬', ai:false, desc:''};
  document.getElementById('ch-name').textContent = room.name;
  document.getElementById('ch-desc').textContent = m.desc || room.description || '';
  document.getElementById('ai-btn').style.display = m.ai ? 'flex' : 'none';
  renderSidebar();

  if(sub) sb.removeChannel(sub);
  await loadMsgs();

  sub = sb.channel('room-'+room.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`room_id=eq.${room.id}`},
      p => { msgs.push(p.new); renderMsgs(); })
    .subscribe();
}

// ── 메시지 ──
async function loadMsgs(){
  document.getElementById('msgs').innerHTML = '<div class="empty-state"><span>⏳</span><span>불러오는 중...</span></div>';
  const { data } = await sb.from('messages').select('*').eq('room_id', curRoom.id)
    .order('created_at',{ascending:true}).limit(300);
  msgs = data || [];
  renderMsgs();
}

function renderMsgs(){
  const el = document.getElementById('msgs');
  if(!msgs.length){
    el.innerHTML='<div class="empty-state"><span>💬</span><span>아직 메시지가 없어요. 첫 메시지를 보내보세요!</span></div>';
    return;
  }
  let html='', lastDate='', lastUser='', lastTime='';
  msgs.forEach(msg=>{
    const d   = new Date(msg.created_at);
    const ds  = d.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
    const ts  = d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    const own = msg.user_name === me?.name;
    const isAI= msg.user_name === 'AI';
    if(ds!==lastDate){ html+=`<div class="day-div"><span>${ds}</span></div>`; lastDate=ds; lastUser=''; }
    const showHead = msg.user_name!==lastUser || ts!==lastTime;
    html+=`<div class="msg-group${own?' own':''}">`;
    if(showHead) html+=`<div class="msg-head">
      <span class="msg-name" style="${isAI?'color:var(--purple)':''}">${isAI?'✨ AI 정리':msg.user_name}</span>
      <span class="msg-time">${ts}</span></div>`;
    html+=`<div class="msg-body${isAI?' ai':''}">`;
    if(isAI) html+=`<div class="ai-label">✦ AI 자동 정리</div>`;
    html+=esc(msg.content)+'</div></div>';
    lastUser=msg.user_name; lastTime=ts;
  });
  el.innerHTML=html;
  el.scrollTop=el.scrollHeight;
}

async function sendMsg(){
  const inp = document.getElementById('msg-inp');
  const txt = inp.value.trim();
  if(!txt||!curRoom||!me) return;
  inp.value=''; resize(inp);
  await sb.from('messages').insert({room_id:curRoom.id, user_id:me.id, user_name:me.name, content:txt});
}

function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }
function resize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

// ── AI 정리 ──
async function runAI(){
  const key = localStorage.getItem('tg_api_key');
  if(!key){ openModal(); return; }

  const btn = document.getElementById('ai-btn');
  btn.disabled=true; btn.textContent='⏳ 정리 중...';

  const recent = msgs.slice(-150);
  const chatTxt = recent.map(m=>`[${m.user_name}] ${m.content}`).join('\n');
  const today = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-allow-browser':'true'
      },
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:2000,
        messages:[{role:'user', content:`다음은 타이어 입고방 채팅 내역입니다. 오늘(${today}) 기준으로 아래 형식에 맞게 정리해주세요.

채팅 내역:
${chatTxt}

출력 형식:
----받아오기----

1. [매일 오후]
(해당 항목들)

양주SFP
(해당 항목들)

2. [황제]
(해당 항목들)

3. [퇴계원]
(해당 항목들)

--------------------------------------

-----거래처 발주-----

1. [매일 오전]
(해당 항목들)

2. [넥센]
(해당 항목들)

3. [한타주문]
(해당 항목들)

4. [극동]
(해당 항목들)

-----------------------------------------------

-----물류차 입고-----

[한국]
(해당 항목들)

[넥센]
(해당 항목들)


규칙:
- 중복 메시지는 하나로 통합 (여러 명이 같은 항목 확인한 것)
- 배송방식(핑직배송, 핑택배, 11번가 택배, 스토어팜 직배 등) 있으면 그대로 유지
- 거래처명(괄호 안) 있으면 유지
- 해당 섹션 내용 없으면 해당 항목 생략
- 원본 형식 최대한 유지`}]
      })
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error.message);
    const summary = data.content?.[0]?.text || '정리 실패';
    await sb.from('messages').insert({
      room_id:curRoom.id, user_id:me.id, user_name:'AI',
      content:`📋 ${today} 정리\n\n${summary}`
    });
  } catch(err){
    if(err.message?.includes('401')||err.message?.includes('API key')){
      localStorage.removeItem('tg_api_key');
      alert('API 키가 올바르지 않습니다. 다시 입력해주세요.');
      openModal();
    } else {
      alert('AI 정리 오류: '+err.message);
    }
  }
  btn.disabled=false; btn.innerHTML='✨ AI 정리';
}

function openModal(){
  const saved=localStorage.getItem('tg_api_key')||'';
  document.getElementById('api-key-inp').value=saved;
  document.getElementById('api-modal').classList.add('on');
}
function closeModal(){ document.getElementById('api-modal').classList.remove('on'); }
function saveKey(){
  const k=document.getElementById('api-key-inp').value.trim();
  if(!k){alert('API 키를 입력해주세요');return;}
  localStorage.setItem('tg_api_key',k);
  closeModal();
  runAI();
}

// ── 자동 로그인 ──
document.getElementById('inp-pw').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
const saved=localStorage.getItem('tg_me');
if(saved){ me=JSON.parse(saved); bootApp(); }
</script>
