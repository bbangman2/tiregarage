<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>타이어게러지 메신저</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f2f1ed;--bg2:#fff;--border:rgba(0,0,0,0.09);
  --text:#1a1a1a;--text2:#777;--text3:#bbb;
  --navy:#1a2035;--purple:#5b35b0;--purple-l:#ede8fb;
  --green:#15803d;--red:#dc2626;
  --r:12px;
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);display:flex;height:100dvh}
#login-wrap{position:fixed;inset:0;background:var(--navy);
  display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.login-card{background:#fff;border-radius:20px;padding:32px 28px;width:100%;max-width:340px;
  box-shadow:0 24px 64px rgba(0,0,0,.35)}
.login-logo{font-size:22px;font-weight:800;color:var(--navy);margin-bottom:3px}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:26px}
.fg{margin-bottom:14px}
.fg label{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.06em;
  text-transform:uppercase;display:block;margin-bottom:5px}
.fg select,.fg input{width:100%;padding:11px 13px;border:1.5px solid var(--border);
  border-radius:10px;font-size:15px;color:var(--text);background:var(--bg);
  outline:none;-webkit-appearance:none;appearance:none;transition:border .15s;font-family:inherit}
.fg select:focus,.fg input:focus{border-color:var(--navy)}
.err{font-size:13px;color:var(--red);margin-bottom:10px;display:none}
.btn-login{width:100%;padding:13px;background:var(--navy);color:#fff;border:none;
  border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-login:active{opacity:.8}
.login-hint{font-size:12px;color:var(--text3);text-align:center;margin-top:12px}
#app{width:100%;display:none;flex-direction:row;height:100dvh}
#app.on{display:flex}
.sidebar{width:190px;background:var(--navy);color:#fff;
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-head{padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-logo{font-size:13px;font-weight:800;letter-spacing:.02em}
.sb-user{font-size:11px;opacity:.4;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-rooms{flex:1;padding:6px;overflow-y:auto}
.room-btn{width:100%;padding:9px 11px;border:none;background:none;
  color:rgba(255,255,255,.6);border-radius:8px;font-size:13px;font-weight:500;
  text-align:left;cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:all .12s;white-space:nowrap;overflow:hidden}
.room-btn:hover{background:rgba(255,255,255,.07);color:#fff}
.room-btn.active{background:rgba(255,255,255,.14);color:#fff}
.room-icon{font-size:14px;flex-shrink:0}
.sb-foot{padding:10px;border-top:1px solid rgba(255,255,255,.07)}
.logout-btn{width:100%;padding:8px;background:none;border:1px solid rgba(255,255,255,.14);
  color:rgba(255,255,255,.45);border-radius:7px;font-size:12px;cursor:pointer;transition:all .12s}
.logout-btn:hover{background:rgba(255,255,255,.07);color:#fff}
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.chat-head{padding:13px 16px;background:#fff;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:15px;font-weight:700;letter-spacing:-.02em;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ch-desc{font-size:11px;color:var(--text2);margin-top:1px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.head-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.mode-badge{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:600;
  cursor:pointer;white-space:nowrap;border:1px solid transparent}
.mode-badge.pattern{background:#dcfce7;color:#15803d;border-color:#bbf7d0}
.mode-badge.gemini{background:#dbeafe;color:#1e40af;border-color:#bfdbfe}
.ai-btn{padding:7px 13px;background:var(--purple);color:#fff;border:none;
  border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:4px;white-space:nowrap;transition:all .15s}
.ai-btn:active{opacity:.8}
.ai-btn:disabled{opacity:.45;cursor:not-allowed}
.msgs{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 14px;
  display:flex;flex-direction:column;gap:2px;-webkit-overflow-scrolling:touch}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.day-div{text-align:center;position:relative;margin:14px 0 8px;flex-shrink:0}
.day-div::before{content:'';position:absolute;left:0;right:0;top:50%;height:.5px;background:var(--border)}
.day-div span{background:var(--bg);padding:0 10px;position:relative;font-size:11px;color:var(--text3)}
.msg-group{max-width:100%;flex-shrink:0}
.msg-group.own{display:flex;flex-direction:column;align-items:flex-end}
.msg-head{display:flex;align-items:baseline;gap:6px;margin-bottom:3px}
.msg-group.own .msg-head{flex-direction:row-reverse}
.msg-name{font-size:12px;font-weight:700}
.msg-time{font-size:11px;color:var(--text3)}
.msg-body{background:#fff;border:1px solid var(--border);
  border-radius:3px 12px 12px 12px;padding:9px 13px;font-size:14px;
  line-height:1.65;white-space:pre-wrap;word-break:break-word;
  max-width:min(520px,85vw);display:inline-block}
.msg-group.own .msg-body{background:#dbeafe;border-color:#bfdbfe;
  border-radius:12px 3px 12px 12px}
.msg-body.ai{
  background:#fff;border:1.5px solid #c4b5fd;border-left:4px solid var(--purple);
  border-radius:4px 12px 12px 12px;font-family:'SF Mono','Fira Code','Courier New',monospace;
  font-size:12px;line-height:1.8;color:#2d1a5e;max-width:min(640px,92vw);padding:14px 16px;
}
.ai-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:10px;
  border-bottom:1px solid #e9d5ff}
.ai-header-icon{font-size:16px}
.ai-header-text{font-size:12px;font-weight:700;color:var(--purple);letter-spacing:.04em}
.ai-section{margin-bottom:14px}
.ai-section-title{font-size:11px;font-weight:700;color:#6b21a8;letter-spacing:.06em;
  text-transform:uppercase;margin-bottom:6px;padding:4px 8px;
  background:#f3e8ff;border-radius:4px;display:inline-block}
.ai-subsection{margin-bottom:10px;margin-left:4px}
.ai-subsection-title{font-size:12px;font-weight:700;color:#374151;margin-bottom:4px}
.ai-item{font-size:12.5px;color:#1f2937;padding:2px 0 2px 12px;
  border-left:2px solid #e9d5ff;margin:2px 0;line-height:1.7}
.ai-item.empty{color:var(--text3);font-style:italic;border-left-color:transparent}
.ai-divider{border:none;border-top:1px dashed #e9d5ff;margin:10px 0}
.ai-mode-tag{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:600;margin-left:auto}
.ai-mode-tag.pattern{background:#dcfce7;color:#15803d}
.ai-mode-tag.gemini{background:#dbeafe;color:#1e40af}
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--text3);flex-direction:column;gap:8px}
.input-wrap{padding:10px 12px 12px;background:#fff;border-top:1px solid var(--border);flex-shrink:0}
.input-row{display:flex;gap:8px;align-items:flex-end}
.msg-inp{flex:1;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;
  font-size:15px;resize:none;min-height:42px;max-height:100px;
  background:var(--bg);color:var(--text);outline:none;font-family:inherit;
  line-height:1.5;transition:border .15s;-webkit-overflow-scrolling:touch}
.msg-inp:focus{border-color:var(--navy)}
.send-btn{padding:10px 16px;background:var(--navy);color:#fff;border:none;
  border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;
  white-space:nowrap;flex-shrink:0;transition:opacity .15s;min-height:42px}
.send-btn:active{opacity:.8}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:none;align-items:flex-end;justify-content:center;z-index:300;padding:0}
.overlay.on{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 22px 32px;
  width:100%;max-width:480px;position:relative;max-height:80dvh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:800;margin-bottom:5px;color:var(--navy)}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.6}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;
  font-size:22px;cursor:pointer;color:var(--text3);line-height:1;padding:4px}
.hint{font-size:12px;color:var(--text2);margin-top:6px;line-height:1.6}
.btn-save{margin-top:14px;width:100%;padding:13px;background:var(--purple);color:#fff;
  border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.btn-save:active{opacity:.8}
.btn-skip{margin-top:8px;width:100%;padding:11px;background:none;color:var(--text2);
  border:1.5px solid var(--border);border-radius:10px;font-size:14px;cursor:pointer}
.mode-card{display:flex;align-items:center;justify-content:space-between;
  background:var(--bg);border-radius:10px;padding:11px 13px;margin-bottom:16px}
.mode-card-label{font-size:13px;color:var(--text2)}
.mode-card-val{font-size:13px;font-weight:700}
.mode-card-val.pattern{color:var(--green)}
.mode-card-val.gemini{color:#1e40af}
@media(max-width:600px){
  .sidebar{width:46px}
  .sb-head,.sb-user,.room-label,.sb-foot{display:none}
  .room-btn{justify-content:center;padding:11px 0}
  .ch-desc{display:none}
  .mode-badge{display:none}
  .msgs{padding:10px 10px}
  .msg-body{font-size:14px;max-width:82vw}
  .msg-body.ai{font-size:11.5px;max-width:90vw}
  .ai-item{font-size:12px}
  .input-wrap{padding:8px 10px 14px}
  .msg-inp{font-size:16px}
}
</style>
</head>
<body>

<div id="login-wrap">
  <div class="login-card">
    <div class="login-logo">🛞 타이어게러지</div>
    <div class="login-sub">내부 메신저 — 직원 전용</div>
    <div class="fg">
      <label>이름</label>
      <select id="sel-name">
        <option value="">선택하세요</option>
        <option>이호준</option>
        <option>남성현</option>
        <option>김다영</option>
        <option>임예지</option>
        <option>이민재</option>
        <option>정지훈</option>
        <option>이영재</option>
        <option>이정우</option>
        <option>이세진</option>
        <option>손정현</option>
      </select>
    </div>
    <div class="fg">
      <label>비밀번호</label>
      <input type="password" id="inp-pw" placeholder="비밀번호 입력">
    </div>
    <div class="err" id="login-err"></div>
    <button class="btn-login" onclick="doLogin()">입장하기</button>
    <div class="login-hint">비밀번호는 각자 개별 지급</div>
  </div>
</div>

<div id="app">
  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-logo">🛞 타이어게러지모터스</div>
      <div class="sb-user" id="sb-username"></div>
    </div>
    <div class="sb-rooms" id="sb-rooms"></div>
    <div class="sb-foot">
      <button class="logout-btn" onclick="doLogout()">나가기</button>
    </div>
  </div>
  <div class="chat-wrap">
    <div class="chat-head">
      <div class="ch-info">
        <div class="ch-name" id="ch-name">채팅방</div>
        <div class="ch-desc" id="ch-desc"></div>
      </div>
      <div class="head-right">
        <span class="mode-badge pattern" id="mode-badge" style="display:none" onclick="openModal()">📋 패턴</span>
        <button class="ai-btn" id="ai-btn" style="display:none" onclick="runAI()">✨ 정리</button>
      </div>
    </div>
    <div class="msgs" id="msgs">
      <div class="empty-state"><span>💬</span><span>불러오는 중...</span></div>
    </div>
    <div class="input-wrap">
      <div class="input-row">
        <textarea class="msg-inp" id="msg-inp"
          placeholder="메시지 입력 (Enter 전송, Shift+Enter 줄바꿈)" rows="1"
          onkeydown="onKey(event)" oninput="resize(this)"></textarea>
        <button class="send-btn" onclick="sendMsg()">전송</button>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="api-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title">✨ AI 정리 설정</div>
    <div class="modal-sub">
      지금은 <b>패턴 자동 정리</b>로 동작해요 (무료).<br>
      Gemini 키 등록 시 AI 정리로 업그레이드됩니다.
    </div>
    <div class="mode-card">
      <span class="mode-card-label">현재 모드</span>
      <span class="mode-card-val" id="cur-mode-txt">패턴 자동 정리 (무료)</span>
    </div>
    <div class="fg">
      <label>Gemini API 키 (선택)</label>
      <input type="text" id="api-key-inp" placeholder="AIza..."
        style="font-family:monospace;font-size:13px;letter-spacing:.02em">
      <div class="hint">무료 발급: <b>aistudio.google.com</b> → Get API Key<br>이 기기에만 저장됩니다.</div>
    </div>
    <button class="btn-save" onclick="saveKey()">저장</button>
    <button class="btn-skip" id="clear-btn" onclick="clearKey()" style="display:none">키 삭제 (패턴 모드로)</button>
    <button class="btn-skip" onclick="closeModal();runPattern()">지금은 패턴 정리로 실행</button>
  </div>
</div>

<script>
const SUPA_URL='https://dohspibpjzdrnigphalt.supabase.co';
const SUPA_KEY='sb_publishable_JCYJcVDoQkHXd6SuhtjIAw_Wz44s0Y3';
const{createClient}=supabase;
const sb=createClient(SUPA_URL,SUPA_KEY);

// ★ 구성원 & 비밀번호 ★
const PW={
  '이호준':'bbangman2',
  '남성현':'tg1234',
  '김다영':'tg1234',
  '임예지':'tg1234',
  '이민재':'tg1234',
  '정지훈':'tg1234',
  '이영재':'tg1234',
  '이정우':'wowlee1216',
  '이세진':'tg1234',
  '손정현':'tg1234'
};

const ROOM_META={
  '입고방':{icon:'📦',ai:true,desc:'받아오기 · 거래처 발주 · 물류차 입고'},
  '공지방':{icon:'📢',ai:false,desc:'사장님 공지 및 전달사항'},
  '자유방':{icon:'💬',ai:false,desc:'자유로운 대화'},
};

let me=null,rooms=[],curRoom=null,msgs=[],sub=null;

async function doLogin(){
  const name=document.getElementById('sel-name').value;
  const pw=document.getElementById('inp-pw').value;
  const err=document.getElementById('login-err');
  err.style.display='none';
  if(!name){showErr('이름을 선택해주세요');return;}
  if(!pw){showErr('비밀번호를 입력해주세요');return;}
  if(PW[name]!==pw){showErr('비밀번호가 틀렸습니다');return;}
  let{data:user}=await sb.from('users').select('*').eq('name',name).maybeSingle();
  if(!user){const{data:c}=await sb.from('users').insert({name,password:pw}).select().single();user=c;}
  me=user;localStorage.setItem('tg_me',JSON.stringify(me));bootApp();
}
function showErr(msg){const e=document.getElementById('login-err');e.textContent=msg;e.style.display='block';}
function doLogout(){
  me=null;localStorage.removeItem('tg_me');
  if(sub)sb.removeChannel(sub);
  document.getElementById('app').classList.remove('on');
  document.getElementById('login-wrap').style.display='flex';
}

async function bootApp(){
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('app').classList.add('on');
  document.getElementById('sb-username').textContent=me.name;
  const{data}=await sb.from('rooms').select('*').order('created_at');
  rooms=data||[];renderSidebar();
  if(rooms.length)selectRoom(rooms[0]);
}
function renderSidebar(){
  const el=document.getElementById('sb-rooms');
  el.innerHTML=rooms.map((r,i)=>{
    const m=ROOM_META[r.name]||{icon:'💬'};
    return`<button class="room-btn${curRoom?.id===r.id?' active':''}" onclick="selectRoom(rooms[${i}])">
      <span class="room-icon">${m.icon}</span><span class="room-label">${r.name}</span></button>`;
  }).join('');
}
async function selectRoom(room){
  curRoom=room;
  const m=ROOM_META[room.name]||{icon:'💬',ai:false,desc:''};
  document.getElementById('ch-name').textContent=room.name;
  document.getElementById('ch-desc').textContent=m.desc||'';
  const aiBtn=document.getElementById('ai-btn');
  const badge=document.getElementById('mode-badge');
  if(m.ai){aiBtn.style.display='flex';badge.style.display='flex';updateBadge();}
  else{aiBtn.style.display='none';badge.style.display='none';}
  renderSidebar();
  if(sub)sb.removeChannel(sub);
  await loadMsgs();
  sub=sb.channel('room-'+room.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`room_id=eq.${room.id}`},
      p=>{msgs.push(p.new);renderMsgs();})
    .subscribe();
}

async function loadMsgs(){
  document.getElementById('msgs').innerHTML='<div class="empty-state"><span>⏳</span><span>불러오는 중...</span></div>';
  const{data}=await sb.from('messages').select('*').eq('room_id',curRoom.id)
    .order('created_at',{ascending:true}).limit(300);
  msgs=data||[];renderMsgs();
}

function renderMsgs(){
  const el=document.getElementById('msgs');
  if(!msgs.length){
    el.innerHTML='<div class="empty-state"><span>💬</span><span>첫 메시지를 보내보세요!</span></div>';
    return;
  }
  let html='',lastDate='',lastUser='',lastTime='';
  msgs.forEach(msg=>{
    if(!msg||!msg.created_at)return;
    const d=new Date(msg.created_at);
    const ds=d.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
    const ts=d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    const own=msg.user_name===me?.name;
    const isAI=msg.user_name==='AI';
    if(ds!==lastDate){html+=`<div class="day-div"><span>${ds}</span></div>`;lastDate=ds;lastUser='';}
    const showHead=msg.user_name!==lastUser||ts!==lastTime;
    html+=`<div class="msg-group${own?' own':''}">`;
    if(showHead){
      html+=`<div class="msg-head">
        <span class="msg-name"${isAI?' style="color:var(--purple)"':''}>${isAI?'✨ AI 정리':esc(msg.user_name||'')}</span>
        <span class="msg-time">${ts}</span></div>`;
    }
    if(isAI){html+=renderAIBubble(msg.content||'');}
    else{html+=`<div class="msg-body">${esc(msg.content||'')}</div>`;}
    html+='</div>';
    lastUser=msg.user_name;lastTime=ts;
  });
  el.innerHTML=html;
  el.scrollTop=el.scrollHeight;
}

function renderAIBubble(raw){
  const rawLines=raw.split('\n');
  const firstLine=(rawLines[0]||'').replace(/^📋\s*/,'').trim();
  const isGemini=firstLine.includes('Gemini');
  const modeTag=isGemini
    ?'<span class="ai-mode-tag gemini">🤖 Gemini</span>'
    :'<span class="ai-mode-tag pattern">📋 패턴</span>';
  const sections=parseAISections(raw);
  let html=`<div class="msg-body ai">
    <div class="ai-header">
      <span class="ai-header-text">${esc(firstLine)}</span>
      ${modeTag}
    </div>`;
  sections.forEach(sec=>{
    html+=`<div class="ai-section"><div class="ai-section-title">${esc(sec.title)}</div>`;
    sec.subs.forEach(s=>{
      if(s.title)html+=`<div class="ai-subsection"><div class="ai-subsection-title">${esc(s.title)}</div>`;
      s.items.forEach(item=>{
        html+=item==='(없음)'||!item.trim()
          ?`<div class="ai-item empty">(없음)</div>`
          :`<div class="ai-item">${esc(item)}</div>`;
      });
      if(s.title)html+=`</div>`;
    });
    html+=`</div><hr class="ai-divider">`;
  });
  html+=`</div>`;
  return html;
}

function parseAISections(raw){
  const lines=raw.split('\n').map(l=>l.trim());
  const sections=[];
  let curSec=null,curSub=null;
  for(const line of lines){
    if(!line||/^📋/.test(line))continue;
    // 순수 구분선만 스킵 (받아오기 등 텍스트 포함 줄은 통과)
    if(/^[-=]+$/.test(line))continue;
    if(/받아오기/.test(line)||/거래처\s*발주/.test(line)||/물류차\s*입고/.test(line)){
      if(curSec)sections.push(curSec);
      let title='';
      if(/받아오기/.test(line))title='📦 받아오기';
      else if(/거래처\s*발주/.test(line))title='📋 거래처 발주';
      else title='🚚 물류차 입고';
      curSec={title,subs:[{title:'',items:[]}]};
      curSub=curSec.subs[0];
      continue;
    }
    if(!curSec)continue;
    if(/^\d+\.\s*\[|^\[/.test(line)||/^양주SFP/.test(line)){
      curSub={title:line,items:[]};
      curSec.subs.push(curSub);
      continue;
    }
    if(curSub)curSub.items.push(line);
  }
  if(curSec)sections.push(curSec);
  return sections;
}

async function sendMsg(){
  const inp=document.getElementById('msg-inp');
  const txt=(inp.value||'').trim();
  if(!txt||!curRoom||!me)return;
  inp.value='';resize(inp);
  try{
    await sb.from('messages').insert({room_id:curRoom.id,user_id:me.id,user_name:me.name,content:txt});
  }catch(e){alert('전송 실패: '+e.message);inp.value=txt;}
}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function resize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function esc(t){
  if(!t)return'';
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
async function postAI(content){
  await sb.from('messages').insert({room_id:curRoom.id,user_id:me.id,user_name:'AI',content});
}

async function runAI(){
  const key=localStorage.getItem('tg_gemini_key');
  const btn=document.getElementById('ai-btn');
  btn.disabled=true;
  try{
    if(key){btn.innerHTML='⏳ Gemini...';await runGemini(key);}
    else{btn.innerHTML='⏳ 정리 중...';await runPattern();}
  }catch(err){
    console.error(err);
    btn.innerHTML='⏳ 재시도...';
    try{await runPattern();}catch(e2){alert('정리 실패: '+e2.message);}
  }
  btn.disabled=false;btn.innerHTML='✨ 정리';
}

async function runGemini(key){
  const recent=msgs.filter(m=>m&&m.user_name!=='AI').slice(-150);
  const chatTxt=recent.map(m=>`[${m.user_name||'?'}] ${m.content||''}`).join('\n');
  const today=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{text:buildPrompt(chatTxt,today)}]}]})
  });
  const data=await res.json();
  if(data.error){
    if(data.error.code===400||data.error.code===403){localStorage.removeItem('tg_gemini_key');updateBadge();}
    throw new Error(data.error.message);
  }
  const result=data.candidates?.[0]?.content?.parts?.[0]?.text||'정리 실패';
  await postAI(`📋 ${today} Gemini AI 정리\n\n${result}`);
}

채팅 내역:
${chatTxt}

출력 형식 (해당 항목 없으면 섹션 생략):
----받아오기----
1. [매일 오후]
(항목들)
양주SFP
(항목들)
2. [황제]
(항목들)
3. [퇴계원]
(항목들)
--------------------------------------
-----거래처 발주-----
1. [매일 오전]
(항목들)
2. [넥센]
(항목들)
3. [한타주문]
(항목들)
4. [극동]
(항목들)
-----------------------------------------------
-----물류차 입고-----
[한국]
(항목들)

규칙: 중복 제거, 배송방식 유지, 원본 형식 최대한 유지`;
}

async function runPattern(){
  const today=new Date().toDateString();
  let src=msgs.filter(m=>m&&m.user_name!=='AI'&&new Date(m.created_at).toDateString()===today);
  if(src.length<3)src=msgs.filter(m=>m&&m.user_name!=='AI').slice(-200);
  const allLines=[];
  src.forEach(m=>{
    (m.content||'').split('\n').forEach(l=>{const t=l.trim();if(t)allLines.push(t);});
  });
  const B={
    recv_maeil:new Map(),recv_yangju:new Map(),recv_hwangje:new Map(),recv_toekyewon:new Map(),
    order_maeil:new Map(),order_nexen:new Map(),order_hanta:new Map(),order_geukdong:new Map(),
    arr_hankook:new Map(),arr_nexen:new Map(),
  };
  let zone='recv',sub2='recv_maeil';
  for(const line of allLines){
    if(/받아오기/.test(line)){zone='recv';sub2='recv_maeil';continue;}
    if(/거래처\s*발주|발주/.test(line)&&!isTireLine(line)){zone='order';sub2='order_maeil';continue;}
    if(/물류차\s*입고|입고/.test(line)&&!isTireLine(line)){zone='arr';sub2='arr_hankook';continue;}
    if(zone==='recv'){
      if(/양주\s*SFP/i.test(line)){sub2='recv_yangju';continue;}
      if(/황제/.test(line)&&!isTireLine(line)){sub2='recv_hwangje';continue;}
      if(/퇴계원/.test(line)&&!isTireLine(line)){sub2='recv_toekyewon';continue;}
      if(/매일\s*(오후|타이어|받아오기)|\[매일\s*오후\]/i.test(line)){sub2='recv_maeil';continue;}
    }
    if(zone==='order'){
      if(/매일\s*오전|\[매일\s*오전\]/i.test(line)){sub2='order_maeil';continue;}
      if(/\[넥센\]|넥센\s*주문/i.test(line)){sub2='order_nexen';continue;}
      if(/한타\s*주문|\[한타/i.test(line)){sub2='order_hanta';continue;}
      if(/\[극동\]|극동/i.test(line)){sub2='order_geukdong';continue;}
    }
    if(zone==='arr'){
      if(/^\[한국\]$/.test(line)){sub2='arr_hankook';continue;}
      if(/^\[넥센\]$/.test(line)){sub2='arr_nexen';continue;}
    }
    if(/^[-=]{3,}$/.test(line))continue;
    if(B[sub2]&&isTireLine(line)){
      const k=tireKey(line);
      if(!B[sub2].has(k))B[sub2].set(k,line);
    }
  }
  const fmt=map=>[...map.values()].map(v=>'  '+v).join('\n')||'  (없음)';
  const todayStr=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
  await postAI(`📋 ${todayStr} 자동 정리 (패턴)\n\n----받아오기----\n\n1. [매일 오후]\n${fmt(B.recv_maeil)}\n\n양주SFP\n${fmt(B.recv_yangju)}\n\n2. [황제]\n${fmt(B.recv_hwangje)}\n\n3. [퇴계원]\n${fmt(B.recv_toekyewon)}\n\n--------------------------------------\n\n-----거래처 발주-----\n\n1. [매일 오전]\n${fmt(B.order_maeil)}\n\n2. [넥센]\n${fmt(B.order_nexen)}\n\n3. [한타주문]\n${fmt(B.order_hanta)}\n\n4. [극동]\n${fmt(B.order_geukdong)}\n\n-----------------------------------------------\n\n-----물류차 입고-----\n\n[한국]\n${fmt(B.arr_hankook)}\n\n[넥센]\n${fmt(B.arr_nexen)}`);
}

function isTireLine(line){
  if(!line||line.length<4)return false;
  if(/^[-=\[\(（]/.test(line))return false;
  if(/^(받아오기|거래처|물류차|매일|황제|한국타이어|넥센|한국|한타|극동|양주|퇴계원|재고\s*주문|@)/.test(line))return false;
  return /[A-Za-z가-힣][A-Za-z0-9가-힣\s\+\-]*[\s\/]\d{2,3}[\s\/]\d{2}/.test(line)||
         /\d{3}[\s\/]\d{2}[\s\/]?\d{2}/.test(line);
}
function tireKey(line){
  return line.toLowerCase().replace(/\s+/g,' ').trim().split(' ').slice(0,5).join(' ');
}

function updateBadge(){
  const key=localStorage.getItem('tg_gemini_key');
  const b=document.getElementById('mode-badge');
  if(!b)return;
  if(key){b.textContent='🤖 Gemini';b.className='mode-badge gemini';}
  else{b.textContent='📋 패턴';b.className='mode-badge pattern';}
}
function openModal(){
  const key=localStorage.getItem('tg_gemini_key')||'';
  document.getElementById('api-key-inp').value=key;
  const mv=document.getElementById('cur-mode-txt');
  const cb=document.getElementById('clear-btn');
  if(key){mv.textContent='Gemini AI (등록됨)';mv.className='mode-card-val gemini';cb.style.display='block';}
  else{mv.textContent='패턴 자동 정리 (무료)';mv.className='mode-card-val pattern';cb.style.display='none';}
  document.getElementById('api-modal').classList.add('on');
}
function closeModal(){document.getElementById('api-modal').classList.remove('on');}
function saveKey(){
  const k=document.getElementById('api-key-inp').value.trim();
  if(k)localStorage.setItem('tg_gemini_key',k);
  else localStorage.removeItem('tg_gemini_key');
  updateBadge();closeModal();
  if(k)runAI();
}
function clearKey(){
  if(confirm('Gemini 키를 삭제하고 패턴 모드로 돌아갈까요?')){
    localStorage.removeItem('tg_gemini_key');updateBadge();closeModal();
  }
}

document.getElementById('inp-pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
const _saved=localStorage.getItem('tg_me');
if(_saved){try{me=JSON.parse(_saved);bootApp();}catch{localStorage.removeItem('tg_me');}}
